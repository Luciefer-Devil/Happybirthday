<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Quest | Access Granted</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-pink: #ff2d75;
            --accent-gold: #ffcc33;
            --text-gray: #a0a0a0;
            --glow-shadow: 0 0 20px rgba(255, 45, 117, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            transition: opacity 0.8s ease;
        }

        .title {
            font-size: 1.2rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        /* Fingerprint Scanner */
        .scanner-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scanner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .progress-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: transparent;
            stroke: var(--accent-pink);
            stroke-width: 4;
            stroke-dasharray: 377; 
            stroke-dashoffset: 377;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        .fingerprint-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
        }

        .fingerprint-btn svg {
            width: 45px;
            height: 45px;
            fill: var(--text-gray);
            transition: fill 0.3s ease, transform 0.3s ease;
        }

        .fingerprint-btn.active {
            transform: scale(0.95);
            box-shadow: 0 0 30px var(--accent-pink);
            border-color: var(--accent-pink);
        }

        .fingerprint-btn.active svg {
            fill: var(--accent-pink);
            filter: drop-shadow(0 0 5px var(--accent-pink));
        }

        .fingerprint-btn.success {
            box-shadow: 0 0 40px var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .fingerprint-btn.success svg {
            fill: var(--accent-gold);
        }

        .status-text {
            height: 24px;
            font-size: 0.9rem;
            color: var(--accent-pink);
            font-weight: 400;
            opacity: 0.8;
            margin-top: 1rem;
        }

        .hint {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        /* Fallback Link */
        #manual-link {
            display: none;
            margin-top: 20px;
            color: var(--accent-gold);
            text-decoration: underline;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Canvas for Confetti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container" id="main-container">
        <h1 class="title" id="main-title">Identity Required</h1>
        
        <div class="scanner-wrapper">
            <div class="scanner-ring"></div>
            <svg class="progress-ring" viewBox="0 0 130 130">
                <circle id="progress-circle" cx="65" cy="65" r="60"></circle>
            </svg>
            <div class="fingerprint-btn" id="scan-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.6 3.42 14 3 12.01 3c-1.98 0-3.86.44-5.58 1.31-.28.14-.62.03-.76-.25s-.03-.62.25-.76c1.88-.95 3.94-1.44 6.09-1.44 2.11 0 3.86.48 5.77 1.48.27.14.38.48.24.75-.08.15-.24.23-.41.23zm3.9 3.59c-.04 0-.08-.01-.12-.02-2.55-.74-4.29-1.04-7.58-1.04-3.3 0-5.03.3-7.58 1.04-.3.09-.61-.09-.7-.38-.09-.3.09-.61.38-.7 2.68-.77 4.54-1.1 7.9-1.1 3.36 0 5.22.33 7.9 1.1.29.08.47.39.38.69-.07.2-.27.32-.48.32zM21.5 12c-.22 0-.42-.13-.5-.35-.55-1.54-1.63-3.15-3.1-4.63-1.41-1.41-3.32-2.31-5.38-2.52-2.07-.22-4.14.07-5.99.85-.29.12-.62-.01-.74-.3-.12-.29.01-.62.3-.74 2.03-.86 4.31-1.18 6.58-.94 2.27.24 4.38 1.23 5.94 2.78 1.62 1.62 2.81 3.42 3.4 5.09.11.3-.05.62-.35.72-.05.02-.1.03-.16.03zm-13.06 9.42c-.23 0-.46-.14-.56-.36-.45-1.02-.68-2.18-.68-3.46 0-1.85.5-3.69 1.41-5.18.17-.28.54-.37.82-.2.28.17.37.54.2.82-.78 1.29-1.2 2.87-1.2 4.56 0 1.1.19 2.11.56 2.95.13.29-.01.62-.3.75-.08.03-.17.05-.25.05zm10.51-1.35c-.14 0-.29-.05-.4-.17-1.46-1.57-2.38-2.71-3.64-4.88-1.32-2.28-1.99-4.81-1.99-7.48 0-1.27.24-2.48.71-3.6.12-.29.45-.43.74-.31.29.12.43.45.31.74-.41.97-.61 2.01-.61 3.17 0 2.45.61 4.77 1.83 6.87 1.19 2.04 2.06 3.1 3.43 4.57.21.23.2.59-.03.8-.1.09-.23.14-.35.14z"/>
                    <path d="M12 22c-.14 0-.28-.06-.39-.16-1.51-1.48-2.73-3.13-3.62-4.89-.96-1.89-1.44-3.89-1.44-5.95 0-3.03 2.47-5.5 5.5-5.5s5.5 2.47 5.5 5.5c0 .33-.27.6-.6.6s-.6-.27-.6-.6c0-2.37-1.93-4.3-4.3-4.3s-4.3 1.93-4.3 4.3c0 1.84.43 3.63 1.28 5.3.8 1.57 1.9 3.06 3.26 4.39.21.21.21.56 0 .77-.1.1-.25.16-.4.16z"/>
                </svg>
            </div>
        </div>

        <div class="status-text" id="status-label">Scan to Begin Birthday Quest</div>
        <div class="hint" id="hint-text">Hold to authenticate</div>
        <div id="manual-link" onclick="window.location.href='https://luciefer-devil.github.io/Happybirthday/happybirthdaygame'">Click here if not redirected automatically</div>
    </div>

    <script>
        const scanBtn = document.getElementById('scan-btn');
        const progressCircle = document.getElementById('progress-circle');
        const statusLabel = document.getElementById('status-label');
        const mainTitle = document.getElementById('main-title');
        const mainContainer = document.getElementById('main-container');
        const hintText = document.getElementById('hint-text');
        const manualLink = document.getElementById('manual-link');
        
        let holdTimer = null;
        let progress = 0;
        const duration = 2000; 
        const circleTotal = 377; 
        let isComplete = false;

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#ff2d75', '#ffcc33', '#ffffff', '#ff5e9a', '#ffd700'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = Math.random() * 8 + 4;
                this.speedX = Math.random() * 12 - 6;
                this.speedY = Math.random() * -20 - 5;
                this.gravity = 0.3;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function createConfetti() {
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].y > canvas.height) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateConfetti);
        }

        // Updated Navigation logic
        function goToNextPage(url, delaySeconds) {
            console.log(`Will navigate to ${url} in ${delaySeconds} seconds`);
            
            // Show manual link as a backup after 5 seconds
            setTimeout(() => {
                manualLink.style.display = 'block';
            }, (delaySeconds + 2) * 1000);

            setTimeout(() => {
                mainContainer.classList.add('fade-out');
                statusLabel.innerText = "Redirecting...";
                
                // Actual redirect
                window.location.href = url;
            }, delaySeconds * 1000);
        }

        function startScan(e) {
            if (isComplete) return;
            if (e.cancelable) e.preventDefault();
            
            scanBtn.classList.add('active');
            statusLabel.innerText = "Scanning Biometrics...";
            hintText.style.opacity = "0";

            let startTime = Date.now();
            
            holdTimer = setInterval(() => {
                let elapsed = Date.now() - startTime;
                progress = Math.min(elapsed / duration, 1);
                
                const offset = circleTotal - (progress * circleTotal);
                progressCircle.style.strokeDashoffset = offset;

                if (progress >= 1) {
                    completeSequence();
                }
            }, 20);
        }

        function stopScan() {
            if (isComplete) return;
            
            clearInterval(holdTimer);
            scanBtn.classList.remove('active');
            
            progress = 0;
            progressCircle.style.strokeDashoffset = circleTotal;
            statusLabel.innerText = "Scan to Begin Birthday Quest";
            hintText.style.opacity = "0.4";
        }

        function completeSequence() {
            if (isComplete) return;
            isComplete = true;
            clearInterval(holdTimer);
            
            scanBtn.classList.remove('active');
            scanBtn.classList.add('success');
            
            statusLabel.style.color = "var(--accent-gold)";
            statusLabel.innerText = "Access Granted! Entering the Kingdom...";
            mainTitle.innerText = "Welcome, Hero";
            mainTitle.style.color = "var(--accent-gold)";
            
            createConfetti();
            animateConfetti();
            
            // Redirect to the URL provided in the chat
            goToNextPage('https://luciefer-devil.github.io/Happybirthday/happybirthdaygame', 3);
        }

        // Event Listeners
        scanBtn.addEventListener('mousedown', startScan);
        window.addEventListener('mouseup', stopScan);

        // Mobile touch events
        scanBtn.addEventListener('touchstart', startScan, { passive: false });
        window.addEventListener('touchend', stopScan);

        // Prevent context menu
        window.oncontextmenu = function(event) {
            event.preventDefault();
            return false;
        };
    </script>
</body>
</html>
